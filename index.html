<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Im System – Alltag in der Sozialen Arbeit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>

  <audio id="bg-music" loop preload="auto">
    <source src="sounds/music.mp3" type="audio/mpeg" />
  </audio>

  <button id="mute-btn" aria-label="Ton ausschalten" title="Ton an/aus">🔊</button>

  <div id="title-screen">
    <h1 class="splash-title">Die Zugfahrt</h1>
    <button id="start-btn">▶ Starten</button>
    <p class="title-meta">Modul 3: Spezifische Methoden der Sozialen Arbeit: Kreativität und Medienpädagogik<br>Prof. Dr. Karsten Krauskopf</p>
    <p class="title-authors">Julia Collatz, Aleksandra Duź, Anne Walter<br>Soziale Arbeit BASA-online</p>
  </div>

  <main class="comic-grid">

    <div class="panel full-width" data-panel="1">
      <img src="slides/Panel01.03.jpg" alt="Ich saß im Zug, das Gesicht in der Sonne…" />
    </div>

    <div class="panel" data-panel="2">
      <img src="slides/Panel02.03.jpg" alt="Kürzungen. Bei Kindern. Bei Jugendlichen. Bei Menschen mit Behinderungen." />
    </div>

    <div class="panel" data-panel="3">
      <img src="slides/Panel03.03.jpg" alt="Für jede Hilfe ein Antrag. Für jede Leistung ein neuer Antrag." />
    </div>

    <div class="panel full-width" data-panel="4">
      <div class="flash-overlay"></div>
      <img src="slides/Panel04.03.jpg" alt="Akten explodieren – das System kollabiert" />
    </div>

    <div class="panel" data-panel="5">
      <img src="slides/Panel05.03.jpg" alt="Ich versuchte, den Überblick zu behalten…" />
    </div>

    <div class="panel" data-panel="6">
      <img src="slides/Panel06.03.jpg" alt="Diese ausufernde Bürokratie geht immer zulasten der Klient*innen." />
    </div>

    <div class="panel" data-panel="7">
      <img src="slides/Panel07.03.jpg" alt="Und irgendwann wurde mir klar: Wir sind alle Klient*innen." />
    </div>

    <div class="panel" data-panel="8">
      <img src="slides/Panel08.03.jpg" alt="Ich fragte mich, warum das alles so kompliziert ist." />
    </div>

    <div class="panel" data-panel="9">
      <img src="slides/Panel09.03.jpg" alt="Ach so. Gibt's nicht." />
    </div>

    <div class="panel" data-panel="10">
      <img src="slides/Panel10.03.jpg" alt="Das Leben ist nicht fair. Und das System gleicht es nicht aus." />
    </div>

    <div class="panel" data-panel="11">
      <img src="slides/Panel11.03.jpg" alt="Nicht alle haben viel Geld. Aber alle verdienen die Chance auf Bildung." />
    </div>

    <div class="panel" data-panel="12">
      <img src="slides/Panel12.03.jpg" alt="Vor meinem inneren Auge sah ich Kinder, die nicht mehr in die Schule gehen wollen." />
    </div>

    <div class="panel" data-panel="13">
      <img src="slides/Panel13.03.jpg" alt="Dann musste ich an die Pandemie denken." />
    </div>

    <div class="panel" data-panel="14">
      <img src="slides/Panel14.03.jpg" alt="Kinder überfordert. Eltern überfordert." />
    </div>

    <div class="panel full-width" id="panel-15" data-panel="15">
      <div class="red-overlay"></div>
      <img src="slides/Panel15.03.jpg" alt="Und ich saß da und dachte nur:" />
    </div>

    <div class="panel" id="panel-16" data-panel="16">
      <div class="red-overlay"></div>
      <img src="slides/Panel16.03.jpg" alt="FUCK THE SYSTEM." />
    </div>

    <div class="panel" data-panel="17">
      <img src="slides/Panel17.03.jpg" alt="Stille. Blick aus dem Zugfenster." />
    </div>

    <div class="panel" data-panel="18">
      <img src="slides/Panel18.03.jpg" alt="Sonnenuntergang über einem See." />
    </div>

    <div class="panel full-width" data-panel="19">
      <img src="slides/Panel19.03.jpg" alt="Zwei Kinder auf einem Bahnsteig winken dem Zug hinterher. Einfach so. Ohne Grund." />
    </div>

    <div id="end-page" class="end-page">
      <div class="end-text">The End</div>
    </div>

  </main>

  <footer>
    <p>Eine Geschichte aus der Sozialen Arbeit. Alle Personen fiktiv.</p>
  </footer>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    const bgMusic   = document.getElementById('bg-music');
    const muteBtn   = document.getElementById('mute-btn');
    const soundHint = document.getElementById('sound-hint');
    let audioReady  = false;
    let muted       = false;
    let panel1Played  = false;
    let panel1Audio   = null;
    let panel16Played = false;
    let panel16Audio  = null;
    const playedPanels = new Set();

    const PANEL_SOUNDS = {};

    // ── Panel 1 sound (eigene Funktion wegen Autoplay-Timing) ────────────────
    function playPanel1Sound() {
      if (panel1Played) return;
      panel1Played = true;
      panel1Audio = new Audio('sounds/panel-01.mp3');
      panel1Audio.volume = 0.7;
      panel1Audio.play().catch(() => {});
    }

    // ── Init on first interaction ─────────────────────────────────────────────
    function initAudio() {
      if (audioReady) return;
      audioReady = true;
      if (soundHint) soundHint.classList.add('hidden');
      bgMusic.volume = 0.4;
      bgMusic.play().catch(() => {});
      // Stelle A: Panel 1 war schon sichtbar bevor User geklickt hat
      if (playedPanels.has(1) && !muted) playPanel1Sound();
    }

    ['click', 'touchstart'].forEach((evt) =>
      document.addEventListener(evt, initAudio, { once: true })
    );

    // ── Mute toggle ───────────────────────────────────────────────────────────
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      bgMusic.muted = muted;
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.setAttribute('aria-label', muted ? 'Ton einschalten' : 'Ton ausschalten');
      if (!muted && !audioReady) initAudio();
    });

    // ── Volume fade ───────────────────────────────────────────────────────────
    function fadeBgTo(targetVol, durationMs, onDone) {
      const steps    = 20;
      const interval = durationMs / steps;
      const delta    = (targetVol - bgMusic.volume) / steps;
      let count = 0;
      const timer = setInterval(() => {
        count++;
        bgMusic.volume = Math.max(0, Math.min(1, bgMusic.volume + delta));
        if (count >= steps) {
          clearInterval(timer);
          bgMusic.volume = targetVol;
          if (onDone) onDone();
        }
      }, interval);
    }

    function duckForPanel4() {
      fadeBgTo(0.15, 300, () => fadeBgTo(0.4, 1000));
    }

    // ── Panel sound playback ──────────────────────────────────────────────────
    function playPanelSound(panelNum) {
      const cfg = PANEL_SOUNDS[panelNum];
      if (!cfg) return;
      try {
        const a = new Audio(cfg.src);
        a.volume = cfg.volume;
        a.play().catch(() => {});
      } catch (e) {}
    }

    // ── Panel 1 animation ────────────────────────────────────────────────────
    function triggerPanel1Animation() {
      const panel1 = document.querySelector('[data-panel="1"]');
      // opacity 0→1, translateY(12px)→0 über 600ms (via .visible CSS transition)
      panel1.classList.add('visible');
      // Stelle B: User hat schon geklickt → Sound sofort abspielen
      if (audioReady && !muted) playPanel1Sound();
    }

    // ── Panel 16 – roter Blitz + Screen-Shake + Sound ────────────────────────
    let panel15Played = false;

    function triggerPanel15() {
      if (panel15Played) return;
      panel15Played = true;

      const panel15 = document.getElementById('panel-15');
      const img = panel15.querySelector('img');
      const redOverlay = panel15.querySelector('.red-overlay');

      // Sound + Musik-Ducking
      if (audioReady && !muted) {
        try {
          panel16Audio = new Audio('sounds/panel-16.mp3');
          panel16Audio.volume = 1.0;
          panel16Audio.play().catch(() => {});
        } catch (e) {}
        fadeBgTo(0.15, 300, () => {
          setTimeout(() => fadeBgTo(0.4, 1000), 2000);
        });
      }

      // Phase 1: Roter Blitz
      redOverlay.style.transition = 'opacity 60ms ease-in';
      redOverlay.style.opacity    = '0.75';
      setTimeout(() => {
        redOverlay.style.transition = 'opacity 60ms ease-out';
        redOverlay.style.opacity    = '0';
      }, 60);

      // Phase 2: Screen-Shake + Bild-Rotation
      setTimeout(() => {
        document.body.classList.remove('shake');
        void document.body.offsetWidth;
        document.body.classList.add('shake');

        img.style.transition = 'transform 140ms ease-in-out';
        img.style.transform  = 'rotate(-1.5deg)';
        setTimeout(() => {
          img.style.transform = 'rotate(1.5deg)';
          setTimeout(() => {
            img.style.transform = 'rotate(0deg)';
          }, 140);
        }, 140);
      }, 80);

      // Phase 3: Shake-Klasse entfernen
      setTimeout(() => {
        document.body.classList.remove('shake');
      }, 500);

      setTimeout(() => {
        img.style.transition = 'transform 200ms ease-out';
        img.style.transform  = 'rotate(0deg)';
      }, 1500);
    }

    function triggerPanel16() {
      if (panel16Played) return;
      panel16Played = true;

      const panel16  = document.getElementById('panel-16');
      const img      = panel16.querySelector('img');
      const redOverlay = panel16.querySelector('.red-overlay');

      // Phase 1 (0–120ms): Roter Blitz
      redOverlay.style.transition = 'opacity 60ms ease-in';
      redOverlay.style.opacity    = '0.75';
      setTimeout(() => {
        redOverlay.style.transition = 'opacity 60ms ease-out';
        redOverlay.style.opacity    = '0';
      }, 60);

      // Phase 2 (80ms): Screen-Shake + Bild-Rotation
      setTimeout(() => {
        document.body.classList.remove('shake');
        void document.body.offsetWidth;
        document.body.classList.add('shake');

        img.style.transition = 'transform 140ms ease-in-out';
        img.style.transform  = 'rotate(-1.5deg)';
        setTimeout(() => {
          img.style.transform = 'rotate(1.5deg)';
          setTimeout(() => {
            img.style.transform = 'rotate(0deg)';
          }, 140);
        }, 140);
      }, 80);

      // Phase 3 (500ms): Shake-Klasse entfernen
      setTimeout(() => {
        document.body.classList.remove('shake');
      }, 500);

      // Phase 3 Ende (1500ms): Sicherheits-Reset
      setTimeout(() => {
        img.style.transition = 'transform 200ms ease-out';
        img.style.transform  = 'rotate(0deg)';
      }, 1500);
    }

    // ── Panel 4 explosion ─────────────────────────────────────────────────────
    function triggerPanel4Explosion() {
      const panel4 = document.querySelector('[data-panel="4"]');
      const img    = panel4.querySelector('img');
      const flash  = panel4.querySelector('.flash-overlay');

      // Sound + ducking start simultaneously with animation
      if (audioReady && !muted) {
        duckForPanel4();
        try {
          const a = new Audio('sounds/panel-04.mp3');
          a.volume = 1.0;
          a.play().catch(() => {});
        } catch (e) {}
      }

      // Phase 1 (0–150ms): scale up + shake via CSS keyframe
      img.style.animation = 'explosion-shake 150ms ease-in forwards';

      // Phase 2 (150ms): Einschlag
      setTimeout(() => {
        img.style.animation  = '';
        img.style.transition = 'transform 150ms ease-in, filter 150ms ease-in';
        img.style.transform  = 'scale(1.35)';
        img.style.filter     = 'blur(4px) brightness(1.8)';

        // Weißer Blitz: 0 → 0.85 → 0
        flash.style.transition = 'opacity 60ms ease-in';
        flash.style.opacity    = '0.85';
        setTimeout(() => {
          flash.style.transition = 'opacity 180ms ease-out';
          flash.style.opacity    = '0';
        }, 60);
      }, 150);

      // Phase 3a (300ms): Ausbreitung – links kippen
      setTimeout(() => {
        img.style.transition = 'transform 200ms ease-out, filter 200ms ease-out';
        img.style.transform  = 'scale(1.2) rotate(-2deg)';
        img.style.filter     = 'blur(0px) brightness(1.6)';
      }, 300);

      // Phase 3b (500ms): rechts kippen
      setTimeout(() => {
        img.style.transition = 'transform 150ms ease-out, filter 150ms ease-out';
        img.style.transform  = 'scale(1.16) rotate(2deg)';
        img.style.filter     = 'blur(0px) brightness(1.3)';
      }, 500);

      // Phase 3c (650ms): zentrieren
      setTimeout(() => {
        img.style.transition = 'transform 100ms ease-out, filter 100ms ease-out';
        img.style.transform  = 'scale(1.12) rotate(0deg)';
        img.style.filter     = 'blur(0px) brightness(1.0)';
      }, 650);

      // Phase 4 (700ms): zurück auf Normal, ease-out
      setTimeout(() => {
        img.style.transition = 'transform 500ms ease-out';
        img.style.transform  = 'scale(1.0)';
      }, 700);
    }

    // ── Observers ─────────────────────────────────────────────────────────────
    const panel16el = document.getElementById('panel-16');

    // Visual: fade-in + shake (threshold 0.15)
    const visualObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const el = entry.target;
        if (el.dataset.panel === '1') { visualObserver.unobserve(el); return; }
        el.classList.add('visible');
        visualObserver.unobserve(el);
      });
    }, { threshold: 0.15 });

    // Sound: panel sounds + ducking (threshold 0.4)
    const soundObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const el       = entry.target;
        const panelNum = parseInt(el.dataset.panel, 10);
        if (!playedPanels.has(panelNum)) {
          playedPanels.add(panelNum);
          if (panelNum === 1) {
            triggerPanel1Animation();
          } else if (panelNum === 4) {
            triggerPanel4Explosion();
          } else if (panelNum === 15) {
            triggerPanel15();
          } else if (panelNum === 16) {
            triggerPanel16();
          } else if (audioReady && !muted) {
            playPanelSound(panelNum);
          }
        }
        soundObserver.unobserve(el);
      });
    }, { threshold: 0.4 });

    // ── The End – Animation + Musikfade ──────────────────────────────────────
    function animateEndPage() {
      const text = document.querySelector('#end-page .end-text');
      text.style.transition = 'opacity 600ms ease-out, transform 600ms ease-out';
      text.style.opacity    = '1';
      text.style.transform  = 'translateY(0)';
      fadeBgTo(0, 3000);
    }

    // ── Starten-Button ────────────────────────────────────────────────────────
    function startComic() {
      initAudio();
      const screen = document.getElementById('title-screen');
      screen.classList.add('hidden');
      setTimeout(() => { screen.style.display = 'none'; }, 800);
      document.querySelectorAll('.panel').forEach((p) => {
        visualObserver.observe(p);
        soundObserver.observe(p);
      });

      // Panel 2 sichtbar → Panel-1-Sound ausblenden
      const panel2el = document.querySelector('[data-panel="2"]');
      const panel1FadeObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          if (panel1Audio && !panel1Audio.paused) {
            const fadeOutPanel1 = setInterval(() => {
              if (panel1Audio.volume > 0.05) {
                panel1Audio.volume = Math.max(0, panel1Audio.volume - 0.05);
              } else {
                panel1Audio.volume = 0;
                panel1Audio.pause();
                clearInterval(fadeOutPanel1);
              }
            }, 100);
          }
          panel1FadeObserver.unobserve(panel2el);
        });
      }, { threshold: 0.3 });
      panel1FadeObserver.observe(panel2el);

      // Panel 17 sichtbar → Panel-16-Sound ausblenden
      const panel17el = document.querySelector('[data-panel="17"]');
      const panel16FadeObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          if (panel16Audio && !panel16Audio.paused) {
            const fadeOut16 = setInterval(() => {
              if (panel16Audio.volume > 0.07) {
                panel16Audio.volume = Math.max(0, panel16Audio.volume - 0.07);
              } else {
                panel16Audio.volume = 0;
                panel16Audio.pause();
                clearInterval(fadeOut16);
              }
            }, 100);
          }
          panel16FadeObserver.unobserve(panel17el);
        });
      }, { threshold: 0.3 });
      panel16FadeObserver.observe(panel17el);

      // End-Page Observer
      const endPageEl = document.getElementById('end-page');
      const endPageObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          animateEndPage();
          endPageObserver.unobserve(endPageEl);
        });
      }, { threshold: 0.3 });
      endPageObserver.observe(endPageEl);
    }

    document.getElementById('start-btn').addEventListener('click', startComic);
  </script>

</body>
</html>
