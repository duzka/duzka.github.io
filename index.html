<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Im System – Alltag in der Sozialen Arbeit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <audio id="bg-music" loop preload="auto">
    <source src="sounds/music.mp3" type="audio/mpeg" />
  </audio>

  <button id="mute-btn" aria-label="Ton ausschalten" title="Ton an/aus">🔊</button>

  <div id="sound-hint">🔊 Klicke irgendwo für Sound</div>

  <header>
    <h1>Im System</h1>
    <p class="subtitle">Alltag in der Sozialen Arbeit</p>
  </header>

  <main class="comic-grid">

    <div class="panel full-width" data-panel="1">
      <img src="slides/Panel01.02.jpg" alt="Ich saß im Zug, das Gesicht in der Sonne…" />
    </div>

    <div class="panel" data-panel="2">
      <img src="slides/Panel02.2.jpg" alt="Kürzungen. Bei Kindern. Bei Jugendlichen. Bei Menschen mit Behinderungen." />
    </div>

    <div class="panel" data-panel="3">
      <img src="slides/Panel03.2.jpg" alt="Für jede Hilfe ein Antrag. Für jede Leistung ein neuer Antrag." />
    </div>

    <div class="panel full-width" data-panel="4">
      <img src="slides/Panel04.02.jpg" alt="Akten explodieren – das System kollabiert" />
    </div>

    <div class="panel" data-panel="6">
      <img src="slides/Panel06.02.jpg" alt="Diese ausufernde Bürokratie geht immer zulasten der Klient*innen." />
    </div>

    <div class="panel" data-panel="7">
      <img src="slides/Panel07.02.jpg" alt="Und irgendwann wurde mir klar: Wir sind alle Klient*innen." />
    </div>

    <div class="panel" data-panel="8">
      <img src="slides/Panel08.02.jpg" alt="Ich fragte mich, warum das alles so kompliziert ist." />
    </div>

    <div class="panel" data-panel="9">
      <img src="slides/Panel09.02.jpg" alt="Ach so. Gibt's nicht." />
    </div>

    <div class="panel" data-panel="10">
      <img src="slides/Panel10.02.jpg" alt="Das Leben ist nicht fair. Und das System gleicht es nicht aus." />
    </div>

    <div class="panel" data-panel="11">
      <img src="slides/Panel11.02.jpg" alt="Nicht alle haben viel Geld. Aber alle verdienen die Chance auf Bildung." />
    </div>

    <div class="panel" data-panel="12">
      <img src="slides/Panel12.02.jpg" alt="Vor meinem inneren Auge sah ich Kinder, die nicht mehr in die Schule gehen wollen." />
    </div>

    <div class="panel" data-panel="13">
      <img src="slides/Panel13.02.jpg" alt="Dann musste ich an die Pandemie denken." />
    </div>

    <div class="panel" data-panel="14">
      <img src="slides/Panel14.02.jpg" alt="Kinder überfordert. Eltern überfordert." />
    </div>

    <div class="panel" data-panel="15">
      <img src="slides/Panel15.02.jpg" alt="Und ich saß da und dachte nur:" />
    </div>

    <div class="panel full-width" id="panel-16" data-panel="16">
      <img src="slides/Panel16.02.jpg" alt="FUCK THE SYSTEM." />
    </div>

    <div class="panel" data-panel="17">
      <img src="slides/Panel17.02.jpg" alt="Stille. Blick aus dem Zugfenster." />
    </div>

    <div class="panel" data-panel="18">
      <img src="slides/Panel18.02.jpg" alt="Sonnenuntergang über einem See." />
    </div>

    <div class="panel full-width" data-panel="19">
      <img src="slides/Panel19.02.jpg" alt="Zwei Kinder auf einem Bahnsteig winken dem Zug hinterher. Einfach so. Ohne Grund." />
    </div>

    <div class="panel full-width" data-panel="20">
      <img src="slides/Panel20.02.jpg" alt="Und ich merkte, dass trotz all des Chaos draußen immer noch kleine Dinge passieren, die sich nicht kaputtregeln lassen." />
    </div>

  </main>

  <footer>
    <p>Eine Geschichte aus der Sozialen Arbeit. Alle Personen fiktiv.</p>
  </footer>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    const bgMusic   = document.getElementById('bg-music');
    const muteBtn   = document.getElementById('mute-btn');
    const soundHint = document.getElementById('sound-hint');
    let audioReady  = false;
    let muted       = false;
    const playedPanels = new Set();

    const PANEL_SOUNDS = {
      1:  { src: 'sounds/panel-01.mp3', volume: 0.7, delay: 0 },
      4:  { src: 'sounds/panel-04.mp3', volume: 1.0, delay: 200 },
      17: { src: 'sounds/panel-17.mp3', volume: 0.7, delay: 0 },
      18: { src: 'sounds/panel-18.mp3', volume: 0.7, delay: 0 },
    };

    // ── Init on first interaction ─────────────────────────────────────────────
    function initAudio() {
      if (audioReady) return;
      audioReady = true;
      soundHint.classList.add('hidden');
      bgMusic.volume = 0.4;
      bgMusic.play().catch(() => {});
    }

    ['click', 'touchstart'].forEach((evt) =>
      document.addEventListener(evt, initAudio, { once: true })
    );

    // ── Mute toggle ───────────────────────────────────────────────────────────
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      bgMusic.muted = muted;
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.setAttribute('aria-label', muted ? 'Ton einschalten' : 'Ton ausschalten');
      if (!muted && !audioReady) initAudio();
    });

    // ── Volume fade ───────────────────────────────────────────────────────────
    function fadeBgTo(targetVol, durationMs, onDone) {
      const steps    = 20;
      const interval = durationMs / steps;
      const delta    = (targetVol - bgMusic.volume) / steps;
      let count = 0;
      const timer = setInterval(() => {
        count++;
        bgMusic.volume = Math.max(0, Math.min(1, bgMusic.volume + delta));
        if (count >= steps) {
          clearInterval(timer);
          bgMusic.volume = targetVol;
          if (onDone) onDone();
        }
      }, interval);
    }

    function duckForPanel4() {
      fadeBgTo(0.15, 300, () => fadeBgTo(0.4, 1000));
    }

    // ── Panel sound playback ──────────────────────────────────────────────────
    function playPanelSound(panelNum) {
      const cfg = PANEL_SOUNDS[panelNum];
      if (!cfg) return;
      const fire = () => {
        try {
          const a = new Audio(cfg.src);
          a.volume = cfg.volume;
          a.play().catch(() => {});
        } catch (e) {}
      };
      cfg.delay > 0 ? setTimeout(fire, cfg.delay) : fire();
    }

    // ── Observers ─────────────────────────────────────────────────────────────
    const panel16el = document.getElementById('panel-16');

    // Visual: fade-in + shake (threshold 0.15)
    const visualObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const el = entry.target;
        el.classList.add('visible');
        if (el === panel16el) {
          el.classList.remove('shake-active');
          void el.offsetWidth;
          el.classList.add('shake-active');
        }
        visualObserver.unobserve(el);
      });
    }, { threshold: 0.15 });

    // Sound: panel sounds + ducking (threshold 0.4)
    const soundObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        const el       = entry.target;
        const panelNum = parseInt(el.dataset.panel, 10);
        if (!playedPanels.has(panelNum)) {
          playedPanels.add(panelNum);
          if (audioReady && !muted) {
            if (panelNum === 4) duckForPanel4();
            playPanelSound(panelNum);
          }
        }
        soundObserver.unobserve(el);
      });
    }, { threshold: 0.4 });

    document.querySelectorAll('.panel').forEach((p) => {
      visualObserver.observe(p);
      soundObserver.observe(p);
    });
  </script>

</body>
</html>
