<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Im System – Alltag in der Sozialen Arbeit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Im System</h1>
    <p class="subtitle">Alltag in der Sozialen Arbeit</p>
  </header>

  <main class="comic-grid">

    <div class="panel" data-panel="1">
      <img src="slides/panel-01.jpg" alt="Ich saß im Zug, das Gesicht in der Sonne…" />
    </div>

    <div class="panel" data-panel="2">
      <img src="slides/panel-02.jpg" alt="Kürzungen. Bei Kindern. Bei Jugendlichen. Bei Menschen mit Behinderungen." />
    </div>

    <div class="panel" data-panel="3">
      <img src="slides/panel-03.jpg" alt="Für jede Hilfe ein Antrag. Für jede Leistung ein neuer Antrag." />
    </div>

    <div class="panel full-width" data-panel="4">
      <img src="slides/panel-04.jpg" alt="Akten explodieren – das System kollabiert" />
    </div>

    <div class="panel" data-panel="5">
      <img src="slides/panel-05.jpg" alt="Ich versuchte, den Überblick zu behalten…" />
    </div>

    <div class="panel" data-panel="6">
      <img src="slides/panel-06.jpg" alt="Diese ausufernde Bürokratie geht immer zulasten der Klient*innen." />
    </div>

    <div class="panel" data-panel="7">
      <img src="slides/panel-07.jpg" alt="Und irgendwann wurde mir klar: Wir sind alle Klient*innen." />
    </div>

    <div class="panel" data-panel="8">
      <img src="slides/panel-08.jpg" alt="Ich fragte mich, warum das alles so kompliziert ist." />
    </div>

    <div class="panel" data-panel="9">
      <img src="slides/panel-09.jpg" alt="Ach so. Gibt's nicht." />
    </div>

    <div class="panel" data-panel="10">
      <img src="slides/panel-10.jpg" alt="Das Leben ist nicht fair. Und das System gleicht es nicht aus." />
    </div>

    <div class="panel" data-panel="11">
      <img src="slides/panel-11.jpg" alt="Nicht alle haben viel Geld. Aber alle verdienen die Chance auf Bildung." />
    </div>

    <div class="panel" data-panel="12">
      <img src="slides/panel-12.jpg" alt="Vor meinem inneren Auge sah ich Kinder, die nicht mehr in die Schule gehen wollen." />
    </div>

    <div class="panel" data-panel="13">
      <img src="slides/panel-13.jpg" alt="Dann musste ich an die Pandemie denken." />
    </div>

    <div class="panel" data-panel="14">
      <img src="slides/panel-14.jpg" alt="Kinder überfordert. Eltern überfordert." />
    </div>

    <div class="panel" data-panel="15">
      <img src="slides/panel-15.jpg" alt="Und ich saß da und dachte nur:" />
    </div>

    <div class="panel full-width" id="panel-16" data-panel="16">
      <img src="slides/panel-16.jpg" alt="FUCK THE SYSTEM." />
    </div>

    <div class="panel" data-panel="17">
      <img src="slides/panel-17.jpg" alt="Stille. Blick aus dem Zugfenster." />
    </div>

    <div class="panel" data-panel="18">
      <img src="slides/panel-18.jpg" alt="Sonnenuntergang über einem See." />
    </div>

    <div class="panel" data-panel="19">
      <img src="slides/panel-19.jpg" alt="Zwei Kinder auf einem Bahnsteig winken dem Zug hinterher. Einfach so. Ohne Grund." />
    </div>

    <div class="panel full-width" data-panel="20">
      <img src="slides/panel-20.jpg" alt="Und ich merkte, dass trotz all des Chaos draußen immer noch kleine Dinge passieren, die sich nicht kaputtregeln lassen." />
    </div>

  </main>

  <footer>
    <p>Eine Geschichte aus der Sozialen Arbeit. Alle Personen fiktiv.</p>
  </footer>

  <script>
    const panels = document.querySelectorAll('.panel');
    const panel16 = document.getElementById('panel-16');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const el = entry.target;
          el.classList.add('visible');

          if (el === panel16) {
            el.classList.remove('shake-active');
            // reflow to restart animation
            void el.offsetWidth;
            el.classList.add('shake-active');
          }

          observer.unobserve(el);
        }
      });
    }, { threshold: 0.15 });

    panels.forEach((panel) => observer.observe(panel));
  </script>

</body>
</html>
