<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Im System – Alltag in der Sozialen Arbeit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Hintergrundmusik – ersetze src mit deiner Datei -->
  <audio id="bg-music" loop preload="auto">
    <source src="audio/background.mp3" type="audio/mpeg" />
    <source src="audio/background.ogg" type="audio/ogg" />
  </audio>

  <!-- Mute-Button -->
  <button id="mute-btn" aria-label="Ton an/aus" title="Ton an/aus">♪</button>

  <header>
    <h1>Im System</h1>
    <p class="subtitle">Alltag in der Sozialen Arbeit</p>
  </header>

  <main class="comic-grid">

    <div class="panel full-width" data-panel="1">
      <img src="slides/Panel01.02.jpg" alt="Ich saß im Zug, das Gesicht in der Sonne…" />
    </div>

    <div class="panel" data-panel="2">
      <img src="slides/Panel02.2.jpg" alt="Kürzungen. Bei Kindern. Bei Jugendlichen. Bei Menschen mit Behinderungen." />
    </div>

    <div class="panel" data-panel="3">
      <img src="slides/Panel03.2.jpg" alt="Für jede Hilfe ein Antrag. Für jede Leistung ein neuer Antrag." />
    </div>

    <div class="panel full-width" data-panel="4">
      <img src="slides/Panel04.02.jpg" alt="Akten explodieren – das System kollabiert" />
    </div>

    <div class="panel" data-panel="5">
      <img src="slides/Panel05.02.jpg" alt="Ich versuchte, den Überblick zu behalten…" />
    </div>

    <div class="panel" data-panel="6">
      <img src="slides/Panel06.02.jpg" alt="Diese ausufernde Bürokratie geht immer zulasten der Klient*innen." />
    </div>

    <div class="panel" data-panel="7">
      <img src="slides/Panel07.02.jpg" alt="Und irgendwann wurde mir klar: Wir sind alle Klient*innen." />
    </div>

    <div class="panel" data-panel="8">
      <img src="slides/Panel08.02.jpg" alt="Ich fragte mich, warum das alles so kompliziert ist." />
    </div>

    <div class="panel" data-panel="9">
      <img src="slides/Panel09.02.jpg" alt="Ach so. Gibt's nicht." />
    </div>

    <div class="panel" data-panel="10">
      <img src="slides/Panel10.02.jpg" alt="Das Leben ist nicht fair. Und das System gleicht es nicht aus." />
    </div>

    <div class="panel" data-panel="11">
      <img src="slides/Panel11.02.jpg" alt="Nicht alle haben viel Geld. Aber alle verdienen die Chance auf Bildung." />
    </div>

    <div class="panel" data-panel="12">
      <img src="slides/Panel12.02.jpg" alt="Vor meinem inneren Auge sah ich Kinder, die nicht mehr in die Schule gehen wollen." />
    </div>

    <div class="panel" data-panel="13">
      <img src="slides/Panel13.02.jpg" alt="Dann musste ich an die Pandemie denken." />
    </div>

    <div class="panel" data-panel="14">
      <img src="slides/Panel14.02.jpg" alt="Kinder überfordert. Eltern überfordert." />
    </div>

    <div class="panel" data-panel="15">
      <img src="slides/Panel15.02.jpg" alt="Und ich saß da und dachte nur:" />
    </div>

    <div class="panel full-width" id="panel-16" data-panel="16">
      <img src="slides/Panel16.02.jpg" alt="FUCK THE SYSTEM." />
    </div>

    <div class="panel" data-panel="17">
      <img src="slides/Panel17.02.jpg" alt="Stille. Blick aus dem Zugfenster." />
    </div>

    <div class="panel" data-panel="18">
      <img src="slides/Panel18.02.jpg" alt="Sonnenuntergang über einem See." />
    </div>

    <div class="panel" data-panel="19">
      <img src="slides/Panel19.02.jpg" alt="Zwei Kinder auf einem Bahnsteig winken dem Zug hinterher. Einfach so. Ohne Grund." />
    </div>

    <div class="panel full-width" data-panel="20">
      <img src="slides/Panel20.02.jpg" alt="Und ich merkte, dass trotz all des Chaos draußen immer noch kleine Dinge passieren, die sich nicht kaputtregeln lassen." />
    </div>

  </main>

  <footer>
    <p>Eine Geschichte aus der Sozialen Arbeit. Alle Personen fiktiv.</p>
  </footer>

  <script>
    // ── Audio setup ──────────────────────────────────────────────────────────
    const bgMusic = document.getElementById('bg-music');
    const muteBtn = document.getElementById('mute-btn');
    let audioCtx = null;
    let audioReady = false;
    let muted = false;

    function initAudio() {
      if (audioReady) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      bgMusic.volume = 0.7;
      bgMusic.play().catch(() => {});
      audioReady = true;
    }

    // Start on first scroll or click (browser autoplay policy)
    ['scroll', 'click', 'touchstart'].forEach((evt) =>
      document.addEventListener(evt, initAudio, { once: true })
    );

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      bgMusic.muted = muted;
      muteBtn.textContent = muted ? '♪̶' : '♪';
      muteBtn.setAttribute('aria-label', muted ? 'Ton einschalten' : 'Ton ausschalten');
      if (!muted && !audioReady) initAudio();
    });

    // ── Volume fade helpers ───────────────────────────────────────────────────
    function fadeTo(targetVol, durationMs, onDone) {
      const startVol = bgMusic.volume;
      const steps = 30;
      const interval = durationMs / steps;
      const delta = (targetVol - startVol) / steps;
      let count = 0;
      const timer = setInterval(() => {
        count++;
        bgMusic.volume = Math.max(0, Math.min(1, bgMusic.volume + delta));
        if (count >= steps) {
          clearInterval(timer);
          bgMusic.volume = targetVol;
          if (onDone) onDone();
        }
      }, interval);
    }

    function duckAndRestore(durationOut, holdMs, durationIn) {
      fadeTo(0, durationOut, () => {
        setTimeout(() => fadeTo(0.7, durationIn), holdMs);
      });
    }

    // ── Synthesized sound effects (Web Audio API) ─────────────────────────────

    // Panel 4: Akten-Explosion – tiefes Rumpeln + Rauschen
    function playExplosion() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      // White noise burst
      const bufLen = Math.floor(audioCtx.sampleRate * 0.8);
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.5);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 300;
      noiseFilter.Q.value = 0.5;

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(1.2, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);

      // Low thud
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(90, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);

      const thudGain = audioCtx.createGain();
      thudGain.gain.setValueAtTime(1.5, now);
      thudGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

      osc.connect(thudGain);
      thudGain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.5);
    }

    // Panel 16: FUCK THE SYSTEM – aggressiver Buzz + Distortion
    function playFuckTheSystem() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      [55, 110, 165].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, now);

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.5 - i * 0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.6);
      });

      // High scratch
      const scratch = audioCtx.createOscillator();
      scratch.type = 'square';
      scratch.frequency.setValueAtTime(800, now);
      scratch.frequency.linearRampToValueAtTime(200, now + 0.15);

      const scratchGain = audioCtx.createGain();
      scratchGain.gain.setValueAtTime(0.3, now);
      scratchGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

      scratch.connect(scratchGain);
      scratchGain.connect(audioCtx.destination);
      scratch.start(now);
      scratch.stop(now + 0.15);
    }

    // Panel 20: Abschluss – sanfte Dur-Terz (C-E-G)
    function playEnding() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, now + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.25, now + i * 0.15 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 2.0);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.15);
        osc.stop(now + i * 0.15 + 2.0);
      });
    }

    // ── IntersectionObserver ──────────────────────────────────────────────────
    const panel16el = document.getElementById('panel-16');

    const SOUND_PANELS = {
      4:  () => { duckAndRestore(400, 800, 800); playExplosion(); },
      16: () => { duckAndRestore(200, 700, 600); playFuckTheSystem(); },
      20: () => { duckAndRestore(600, 2000, 1200); playEnding(); },
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;

        const el = entry.target;
        el.classList.add('visible');

        if (el === panel16el) {
          el.classList.remove('shake-active');
          void el.offsetWidth;
          el.classList.add('shake-active');
        }

        const panelNum = parseInt(el.dataset.panel, 10);
        if (SOUND_PANELS[panelNum] && audioReady && !muted) {
          SOUND_PANELS[panelNum]();
        }

        observer.unobserve(el);
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.panel').forEach((p) => observer.observe(p));
  </script>

</body>
</html>
